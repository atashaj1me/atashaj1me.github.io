<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog post — Thang Nguyen</title>
  <link rel="stylesheet" href="../assets/css/site.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <style>
    .md h1 { font-family: var(--font-serif); font-weight: 700; text-transform: none; letter-spacing: 0; border: 0; }
    .md h2, .md h3 { text-transform: none; letter-spacing: 0; }
    .md pre { background: #fff; border: 1px solid var(--rule); padding: 0.75rem 1rem; overflow-x: auto; font-size: 0.9rem; }
    .md code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9em; }
    .md blockquote { border-left: 3px solid var(--rule); padding-left: 1rem; color: var(--meta); margin: 1rem 0; }
    .md table { border-collapse: collapse; margin: 1rem 0; }
    .md th, .md td { border-bottom: 1px solid var(--rule); padding: 0.4rem 0.75rem; text-align: left; }
    .md img { margin: 1rem 0; }
    .md .katex-display { overflow-x: auto; overflow-y: hidden; }
    .post-meta { font-family: var(--font-sans); font-size: 0.85rem; color: var(--meta); margin: 0 0 0.5rem; }
  </style>
</head>
<body>
<header class="site">
  <div class="inner">
    <a class="wordmark" href="../">Thang Nguyen</a>
    <nav>
      <a href="../research.html">Research</a>
      <a href="../wip.html">Work in Progress</a>
      <a href="../notes.html">Investment Notes</a>
      <a href="./" aria-current="page">Blog</a>
      <a href="../cv.html">CV</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <p class="post-meta" id="post-date"></p>
  <article class="md" id="post"></article>
  <hr>
  <p><a href="./">&larr; Back to blog</a></p>
</main>

<footer class="site">
  <div class="inner">
    <span>&copy; <span class="yr">2026</span> Thang Nguyen</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

<script>
document.querySelectorAll('.yr').forEach(e => e.textContent = new Date().getFullYear());

(async () => {
  const params = new URLSearchParams(location.search);
  const slug = params.get('p');
  const target = document.getElementById('post');
  const dateEl = document.getElementById('post-date');

  if (!slug || !/^[A-Za-z0-9._-]+$/.test(slug)) {
    target.innerHTML = '<h1>Post not found</h1><p>No post specified. <a href="./">Back to blog</a>.</p>';
    return;
  }

  // Date prefix from filename: YYYY-MM-DD-slug
  const m = slug.match(/^(\d{4}-\d{2}-\d{2})-/);
  if (m) dateEl.textContent = m[1];

  let md;
  try {
    const r = await fetch('posts/' + slug + '.md');
    if (!r.ok) throw new Error(r.status);
    md = await r.text();
  } catch (e) {
    target.innerHTML = '<h1>Post not found</h1><p>Could not load <code>posts/' + slug + '.md</code>. <a href="./">Back to blog</a>.</p>';
    return;
  }

  marked.setOptions({ gfm: true, breaks: false, headerIds: true, mangle: false });
  target.innerHTML = marked.parse(md);

  // First H1 → document title
  const h1 = target.querySelector('h1');
  if (h1) document.title = h1.textContent + ' — Thang Nguyen';

  // KaTeX auto-render after libs load
  const renderMath = () => {
    if (!window.renderMathInElement) return setTimeout(renderMath, 50);
    renderMathInElement(target, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '\\[', right: '\\]', display: true },
        { left: '$',  right: '$',  display: false },
        { left: '\\(', right: '\\)', display: false }
      ],
      throwOnError: false
    });
  };
  renderMath();
})();
</script>
</body>
</html>
